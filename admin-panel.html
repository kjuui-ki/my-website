<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة تحكم المدير العام | Rawad Health</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ===== Admin Panel Specific Styles ===== */
    .admin-header-banner {
      background: linear-gradient(135deg, #023E8A, #0077B6);
      color: #fff;
      padding: 48px 0 36px;
      text-align: center;
    }
    .admin-header-banner h1 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .admin-header-banner p {
      font-size: 1rem;
      opacity: 0.85;
    }

    .admin-content {
      padding: 48px 0 80px;
      min-height: 60vh;
    }

    .section-title {
      font-size: 1.4rem;
      font-weight: 800;
      color: #023E8A;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 3px solid #0077B6;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .badge-count {
      background: #0077B6;
      color: #fff;
      border-radius: 20px;
      padding: 2px 12px;
      font-size: 0.85rem;
      font-weight: 700;
    }

    /* Loading */
    .loading-state {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #e0e0e0;
      border-top-color: #0077B6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #888;
    }
    .empty-state svg {
      margin-bottom: 16px;
      opacity: 0.4;
    }
    .empty-state p { font-size: 1.05rem; }

    /* Admin cards */
    .admins-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    .admin-card {
      background: #fff;
      border: 1px solid #e8edf3;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      transition: box-shadow 0.2s;
    }
    .admin-card:hover {
      box-shadow: 0 6px 24px rgba(0,0,0,0.1);
    }

    .admin-card-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }
    .admin-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0077B6, #023E8A);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 1.3rem;
      font-weight: 800;
      flex-shrink: 0;
    }
    .admin-info h3 {
      font-size: 1rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 2px;
    }
    .admin-info span {
      font-size: 0.82rem;
      color: #888;
      word-break: break-all;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .status-pending  { background: #fff3cd; color: #856404; }
    .status-approved { background: #d4edda; color: #155724; }
    .status-rejected { background: #f8d7da; color: #721c24; }

    .admin-meta {
      font-size: 0.82rem;
      color: #999;
      margin-bottom: 18px;
    }

    .card-actions {
      display: flex;
      gap: 10px;
    }
    .btn-approve, .btn-reject {
      flex: 1;
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      font-size: 0.9rem;
      font-family: 'Tajawal', sans-serif;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s;
    }
    .btn-approve {
      background: #2D9F4E;
      color: #fff;
    }
    .btn-approve:hover { background: #237a3c; transform: translateY(-1px); }
    .btn-reject {
      background: #dc3545;
      color: #fff;
    }
    .btn-reject:hover { background: #b02a37; transform: translateY(-1px); }
    .btn-approve:disabled, .btn-reject:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a2e;
      color: #fff;
      padding: 14px 28px;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      z-index: 9999;
      transition: transform 0.35s ease;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.toast-success { border-right: 4px solid #2D9F4E; }
    .toast.toast-error   { border-right: 4px solid #dc3545; }

    /* Access denied */
    .denied-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
    }
    .denied-box {
      text-align: center;
      max-width: 420px;
      padding: 48px 32px;
    }
    .denied-box .icon { font-size: 4rem; margin-bottom: 16px; }
    .denied-box h2   { font-size: 1.5rem; font-weight: 800; color: #023E8A; margin-bottom: 8px; }
    .denied-box p    { color: #666; margin-bottom: 24px; }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="container">
      <nav class="navbar">
        <a href="index.html" class="logo">
          <img src="images/logo.png" alt="Rawad Health" height="120" style="object-fit:contain;">
        </a>
        <div class="nav-links">
          <a href="index.html">الرئيسية</a>
          <a href="jobs.html">الوظائف</a>
          <a href="contact.html">تواصل معنا</a>
        </div>
        <div class="nav-cta">
          <div class="user-menu" id="userMenu" style="display:flex; align-items:center; gap:10px;">
            <span class="user-greeting" id="userGreeting">مرحباً</span>
            <button class="btn btn-outline" onclick="window._supabase.auth.signOut().then(function(){window.location.href='login.html'})" style="padding: 10px 24px; font-size: 0.9rem;">تسجيل الخروج</button>
          </div>
          <div class="auth-btns" id="authButtons" style="display:none;">
            <a href="login.html" class="btn btn-outline" style="padding: 10px 24px; font-size: 0.9rem;">تسجيل الدخول</a>
          </div>
        </div>
        <button class="hamburger" aria-label="القائمة">
          <span></span><span></span><span></span>
        </button>
      </nav>
    </div>
  </header>

  <!-- Dark overlay behind mobile menu -->
  <div class="nav-overlay" id="navOverlay"></div>

  <!-- Page content (shown only to superadmin) -->
  <div id="pageContent" style="display:none;">
    <div class="admin-header-banner">
      <div class="container">
        <h1>لوحة تحكم المدير العام</h1>
        <p>إدارة طلبات تسجيل المسؤولين</p>
      </div>
    </div>

    <main class="admin-content">
      <div class="container">
        <div class="section-title">
          طلبات المسؤولين المعلّقة
          <span class="badge-count" id="pendingCount">0</span>
        </div>

        <!-- Loading -->
        <div id="loadingState" class="loading-state">
          <div class="spinner"></div>
          <p>جاري تحميل الطلبات...</p>
        </div>

        <!-- Empty -->
        <div id="emptyState" class="empty-state" style="display:none;">
          <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#0077B6" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
          </svg>
          <p>لا توجد طلبات معلّقة حالياً</p>
        </div>

        <!-- Admins Grid -->
        <div id="adminsGrid" class="admins-grid" style="display:none;"></div>
      </div>
    </main>
  </div>

  <!-- Access Denied (shown to non-superadmin) -->
  <div id="deniedContent" style="display:none;">
    <main class="denied-page">
      <div class="denied-box">
        <div class="icon">🔒</div>
        <h2>غير مصرح بالوصول</h2>
        <p>هذه الصفحة مخصصة للمدير العام فقط.</p>
        <a href="index.html" class="btn btn-primary">العودة للرئيسية</a>
      </div>
    </main>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabaseClient.js"></script>
  <script>
    // ── Auth Guard: superadmin only ──────────────────────────────────
    window._supabase.auth.getSession().then(function ({ data: { session } }) {
      if (!session) {
        window.location.href = 'login.html';
        return;
      }
      var user = session.user;
      if (user.email !== 'kramabid1@gmail.com') {
        document.getElementById('pageContent').style.display  = 'none';
        document.getElementById('deniedContent').style.display = 'block';
        return;
      }
      var meta = user.user_metadata || {};
      var displayName = meta.full_name || meta.name || user.email;
      document.getElementById('userGreeting').textContent = 'مرحباً، ' + displayName;
      document.getElementById('pageContent').style.display = 'block';
      loadPendingAdmins();
    });

    // ── Load pending admins from users table ─────────────────────────
    async function loadPendingAdmins() {
      var loadingEl = document.getElementById('loadingState');
      var emptyEl   = document.getElementById('emptyState');
      var gridEl    = document.getElementById('adminsGrid');
      var countEl   = document.getElementById('pendingCount');

      try {
        const { data, error } = await window._supabase
          .from('users')
          .select('id, email, role, status, created_at')
          .eq('role', 'admin')
          .eq('status', 'pending')
          .order('created_at', { ascending: false });

        if (error) throw error;

        loadingEl.style.display = 'none';

        if (!data || data.length === 0) {
          emptyEl.style.display = 'block';
          countEl.textContent   = '0';
          return;
        }

        countEl.textContent  = data.length;
        gridEl.style.display = 'grid';

        data.forEach(function (row) {
          gridEl.appendChild(buildCard(row));
        });

      } catch (err) {
        loadingEl.innerHTML = '<p style="color:#dc3545">حدث خطأ أثناء تحميل البيانات: ' + escapeHtml(err.message) + '</p>';
      }
    }

    // ── Build admin card ─────────────────────────────────────────────
    function buildCard(row) {
      var initial = (row.email || 'A')[0].toUpperCase();
      var date    = row.created_at ? new Date(row.created_at).toLocaleDateString('ar-SA') : '-';

      var card = document.createElement('div');
      card.className = 'admin-card';
      card.id = 'card-' + row.id;
      card.innerHTML =
        '<div class="admin-card-header">' +
          '<div class="admin-avatar">' + escapeHtml(initial) + '</div>' +
          '<div class="admin-info">' +
            '<h3>' + escapeHtml(row.email) + '</h3>' +
            '<span>مسؤول</span>' +
          '</div>' +
        '</div>' +
        '<span class="status-badge status-pending">معلّق</span>' +
        '<div class="admin-meta">📅 تاريخ التسجيل: ' + escapeHtml(date) + '</div>' +
        '<div class="card-actions">' +
          '<button class="btn-approve" id="approve-' + row.id + '" onclick="updateStatus(\'' + row.id + '\', \'approved\')">✅ موافقة</button>' +
          '<button class="btn-reject"  id="reject-'  + row.id + '" onclick="updateStatus(\'' + row.id + '\', \'rejected\')">❌ رفض</button>' +
        '</div>';
      return card;
    }

    // ── Approve / Reject ─────────────────────────────────────────────
    async function updateStatus(userId, newStatus) {
      var approveBtn = document.getElementById('approve-' + userId);
      var rejectBtn  = document.getElementById('reject-'  + userId);
      if (approveBtn) { approveBtn.disabled = true; approveBtn.textContent = '...'; }
      if (rejectBtn)  { rejectBtn.disabled  = true; rejectBtn.textContent  = '...'; }

      try {
        const { error } = await window._supabase
          .from('users')
          .update({ status: newStatus })
          .eq('id', userId);

        if (error) throw error;

        var arabic = newStatus === 'approved' ? 'موافق عليه' : 'مرفوض';
        var icon   = newStatus === 'approved' ? '✅' : '❌';
        showToast(icon + ' تم التحديث: ' + arabic, 'success');

        // Remove the card and refresh count
        var card = document.getElementById('card-' + userId);
        if (card) card.remove();
        var remaining = document.querySelectorAll('.admin-card').length;
        document.getElementById('pendingCount').textContent = remaining;
        if (remaining === 0) {
          document.getElementById('adminsGrid').style.display = 'none';
          document.getElementById('emptyState').style.display = 'block';
        }

      } catch (err) {
        if (approveBtn) { approveBtn.disabled = false; approveBtn.textContent = '✅ موافقة'; }
        if (rejectBtn)  { rejectBtn.disabled  = false; rejectBtn.textContent  = '❌ رفض';   }
        showToast('حدث خطأ: ' + escapeHtml(err.message), 'error');
      }
    }

    // ── Toast helper ─────────────────────────────────────────────────
    function showToast(msg, type) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className   = 'toast toast-' + type + ' show';
      setTimeout(function () { toast.className = 'toast'; }, 3000);
    }

    // ── XSS protection ───────────────────────────────────────────────
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  </script>
</body>
</html>
