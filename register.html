<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إنشاء حساب | Rawad Health</title>
  <meta name="description" content="أنشئ حسابك في منصة Rawad Health للتوظيف الصحي.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="container">
      <nav class="navbar">
        <a href="index.html" class="logo">
          <img src="images/logo.png" alt="Rawad Health" height="120" style="object-fit:contain;">
        </a>
        <div class="nav-desktop">
          <a href="index.html" data-i18n="navHome">الرئيسية</a>
          <a href="jobs.html" data-i18n="navJobs">الوظائف</a>
          <a href="contact.html" data-i18n="navContact">تواصل معنا</a>
        </div>
        <div class="nav-cta">
          <div class="auth-btns" id="authButtons">
            <a href="login.html" class="btn btn-outline" style="padding: 10px 24px; font-size: 0.9rem;" data-i18n="authLogin">تسجيل الدخول</a>
            <a href="register.html" class="btn btn-primary" style="padding: 10px 24px; font-size: 0.9rem;" data-i18n="authRegister">إنشاء حساب</a>
          </div>
          <div class="user-menu" id="userMenu" style="display:none; align-items:center; gap:10px;">
            <span class="user-greeting" id="userGreeting"></span>
            <button class="btn btn-outline" onclick="authLogout()" style="padding: 10px 24px; font-size: 0.9rem;" data-i18n="authLogout">تسجيل الخروج</button>
          </div>
          <div class="lang-switcher">
            <button class="lang-btn" id="langToggle" aria-label="تغيير اللغة" onclick="toggleLanguage()">
              <span class="lang-icon">🌐</span>
              <span class="lang-label" data-i18n="langLabel">EN</span>
            </button>
          </div>
        </div>
        <button class="hamburger" aria-label="القائمة">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </nav>
    </div>
  </header>

  <!-- Mobile nav drawer (outside header to avoid stacking context issues) -->
  <div class="nav-links">
    <a href="index.html" data-i18n="navHome">الرئيسية</a>
    <a href="jobs.html" data-i18n="navJobs">الوظائف</a>
    <a href="contact.html" data-i18n="navContact">تواصل معنا</a>
    <div class="mobile-auth">
      <div class="mobile-auth-divider"></div>
      <div class="mobile-auth-inner" id="mobileAuthButtons">
        <a href="login.html" class="btn btn-outline mobile-auth-btn" data-i18n="authLogin">تسجيل الدخول</a>
        <a href="register.html" class="btn btn-primary mobile-auth-btn" data-i18n="authRegister">إنشاء حساب</a>
      </div>
      <div class="mobile-user-section" id="mobileUserMenu" style="display:none;">
        <span class="mobile-user-greeting" id="mobileUserGreeting"></span>
        <button class="btn btn-outline mobile-auth-btn" onclick="authLogout()" data-i18n="authLogout">تسجيل الخروج</button>
      </div>
    </div>
  </div>

  <!-- Dark overlay behind mobile menu -->
  <div class="nav-overlay" id="navOverlay"></div>

  <!-- Register Form -->
  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="images/logo.png" alt="Rawad Health" height="120" style="object-fit:contain;">
      </div>
      <h1 class="auth-title" data-i18n="registerTitle">إنشاء حساب</h1>
      <p class="auth-subtitle" data-i18n="registerSubtitle">انضم إلى منصة Rawad Health</p>

      <!-- Account type selection -->
      <div class="account-type-group">
        <div class="type-option selected" id="typeJobSeeker" onclick="selectType('jobseeker')">
          <span class="type-icon">👨‍⚕️</span>
          <div class="type-label" data-i18n="typeJobSeekerLabel">باحث عن عمل</div>
        </div>
        <div class="type-option" id="typeAdmin" onclick="selectType('admin')">
          <span class="type-icon">🏥</span>
          <div class="type-label" data-i18n="typeAdminLabel">مسؤول / مؤسسة صحية</div>
        </div>
      </div>

      <div class="alert alert-error"   id="registerError"></div>
      <div class="alert alert-success" id="registerSuccess"></div>

      <form id="registerForm" novalidate>
        <!-- Job Seeker fields -->
        <div id="jobseekerFields">
          <div class="form-group">
            <label for="fullName" data-i18n="labelFullNameRegister">الاسم الكامل</label>
            <input type="text" id="fullName" placeholder="محمد عبدالله" autocomplete="name">
          </div>
        </div>

        <!-- Admin fields -->
        <div id="adminFields" style="display:none;">
          <div class="form-group">
            <label for="orgName" data-i18n="labelOrgName">اسم المؤسسة</label>
            <input type="text" id="orgName" placeholder="مستشفى / عيادة / مركز صحي" autocomplete="organization">
          </div>
        </div>

        <div class="form-group">
          <label for="regEmail" data-i18n="labelEmail">البريد الإلكتروني</label>
          <input type="email" id="regEmail" placeholder="example@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="regPhone" data-i18n="regPhoneLabel">رقم الجوال</label>
          <input type="tel" id="regPhone" placeholder="05xxxxxxxx" maxlength="10" autocomplete="tel">
        </div>
        <div class="form-group">
          <label for="regPassword" data-i18n="labelPasswordRegister">كلمة المرور</label>
          <input type="password" id="regPassword" placeholder="8 أحرف على الأقل" autocomplete="new-password">
        </div>

        <button type="submit" class="btn btn-primary form-btn" data-i18n="registerBtn">إنشاء الحساب</button>
      </form>

      <div class="auth-footer">
        <span data-i18n="registerHasAccount">لديك حساب بالفعل؟</span> <a href="login.html" data-i18n="authLogin">تسجيل الدخول</a>
      </div>
    </div>
  </main>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabaseClient.js"></script>
  <script src="script.js"></script>
  <script>
    // Redirect if already logged in
    window._supabase.auth.getSession().then(function ({ data: { session } }) {
      if (session) window.location.href = 'jobs.html';
    });

    let selectedType = 'jobseeker';

    function selectType(type) {
      selectedType = type;
      document.getElementById('typeJobSeeker').classList.toggle('selected', type === 'jobseeker');
      document.getElementById('typeAdmin').classList.toggle('selected', type === 'admin');
      document.getElementById('jobseekerFields').style.display = type === 'jobseeker' ? 'block' : 'none';
      document.getElementById('adminFields').style.display     = type === 'admin'     ? 'block' : 'none';
    }

    document.getElementById('registerForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const email    = document.getElementById('regEmail').value.trim();
      const phone    = document.getElementById('regPhone').value.trim();
      const password = document.getElementById('regPassword').value;
      const errorBox   = document.getElementById('registerError');
      const successBox = document.getElementById('registerSuccess');
      const btn = this.querySelector('button[type="submit"]');

      const nameVal = selectedType === 'jobseeker'
        ? document.getElementById('fullName').value.trim()
        : document.getElementById('orgName').value.trim();

      const errors = [];
      if (!nameVal) errors.push(selectedType === 'jobseeker' ? 'يرجى إدخال الاسم الكامل' : 'يرجى إدخال اسم المؤسسة');
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) errors.push('يرجى إدخال بريد إلكتروني صحيح');
      if (!phone || phone.length < 10 || !/^\d+$/.test(phone)) errors.push('يرجى إدخال رقم جوال صحيح (10 أرقام)');
      if (!password || password.length < 8) errors.push('كلمة المرور يجب أن تكون 8 أحرف على الأقل');

      errorBox.style.display   = 'none';
      successBox.style.display = 'none';

      if (errors.length) {
        errorBox.innerHTML     = errors.join('<br>');
        errorBox.style.display = 'block';
        return;
      }

      btn.textContent = 'جاري الإنشاء...';
      btn.disabled = true;

      const { data, error } = await window._supabase.auth.signUp({
        email,
        password,
        options: {
          data: {
            full_name: nameVal,
            phone: phone,
            role: selectedType
          }
        }
      });

      console.log('[Register] signUp result — data:', data, 'error:', error);

      if (error) {
        btn.textContent = 'إنشاء الحساب';
        btn.disabled = false;
        let msg = 'خطأ: ' + error.message;
        const el = (error.message || '').toLowerCase();
        if (el.includes('already registered') || el.includes('already been registered')) {
          msg = 'البريد الإلكتروني مسجل بالفعل — يرجى تسجيل الدخول';
        } else if (el.includes('password') && el.includes('weak')) {
          msg = 'كلمة المرور ضعيفة جداً، يرجى اختيار كلمة مرور أقوى';
        } else if (el.includes('rate limit') || el.includes('too many')) {
          msg = 'محاولات كثيرة جداً، يرجى الانتظار قليلاً';
        }
        errorBox.textContent   = msg;
        errorBox.style.display = 'block';
        return;
      }

      // data.session is null when email confirmation is required
      const needsConfirm = !data.session;
      if (selectedType === 'admin') {
        // Admin accounts always require superadmin approval before login
        if (needsConfirm) {
          successBox.innerHTML = '✅ تم إنشاء الحساب! <strong>يرجى تأكيد بريدك الإلكتروني أولاً</strong>، ثم انتظر موافقة المدير العام قبل تسجيل الدخول.';
        } else {
          successBox.innerHTML = '✅ تم إنشاء الحساب! <strong>حسابك قيد مراجعة المدير العام.</strong> سيتم تفعيل صلاحياتك بعد الموافقة على طلبك.';
          await window._supabase.auth.signOut();
        }
      } else {
        if (needsConfirm) {
          successBox.innerHTML = '✅ تم إنشاء الحساب! <strong>يرجى فتح بريدك الإلكتروني والنقر على رابط التأكيد</strong> قبل تسجيل الدخول.';
        } else {
          successBox.textContent = '✅ تم إنشاء الحساب بنجاح! جاري التحويل إلى صفحة الدخول...';
          await window._supabase.auth.signOut();
          setTimeout(function () { window.location.href = 'login.html'; }, 2000);
        }
      }
      successBox.style.display = 'block';
      btn.textContent = 'إنشاء الحساب';
      btn.disabled = false;
    });
  </script>
</body>
</html>
