<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إنشاء حساب | Rawad Health</title>
  <meta name="description" content="أنشئ حسابك في منصة Rawad Health للتوظيف الصحي.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="container">
      <nav class="navbar">
        <a href="index.html" class="logo">
          <img src="logo.svg" alt="Rawad Health" height="44">
        </a>
        <div class="nav-links">
          <a href="index.html" data-i18n="navHome">الرئيسية</a>
          <a href="jobs.html" data-i18n="navJobs">الوظائف</a>
          <a href="contact.html" data-i18n="navContact">تواصل معنا</a>
        </div>
        <div class="nav-cta">
          <div class="auth-btns" id="authButtons">
            <a href="login.html" class="btn btn-outline" style="padding: 10px 24px; font-size: 0.9rem;">تسجيل الدخول</a>
            <a href="register.html" class="btn btn-primary" style="padding: 10px 24px; font-size: 0.9rem;">إنشاء حساب</a>
          </div>
          <div class="user-menu" id="userMenu" style="display:none; align-items:center; gap:10px;">
            <span class="user-greeting" id="userGreeting"></span>
            <button class="btn btn-outline" onclick="authLogout()" style="padding: 10px 24px; font-size: 0.9rem;">تسجيل الخروج</button>
          </div>
          <div class="lang-switcher">
            <button class="lang-btn" id="langToggle" aria-label="تغيير اللغة">
              <span class="lang-icon">🌐</span>
              <span class="lang-label" data-i18n="langLabel">EN</span>
            </button>
          </div>
        </div>
        <button class="hamburger" aria-label="القائمة">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </nav>
    </div>
  </header>

  <!-- Register Form -->
  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="logo.svg" alt="Rawad Health">
      </div>
      <h1 class="auth-title">إنشاء حساب</h1>
      <p class="auth-subtitle">انضم إلى منصة Rawad Health</p>

      <!-- Account type selection -->
      <div class="account-type-group">
        <div class="type-option selected" id="typeJobSeeker" onclick="selectType('jobseeker')">
          <span class="type-icon">👨‍⚕️</span>
          <div class="type-label">باحث عن عمل</div>
        </div>
        <div class="type-option" id="typeAdmin" onclick="selectType('admin')">
          <span class="type-icon">🏥</span>
          <div class="type-label">مسؤول / مؤسسة صحية</div>
        </div>
      </div>

      <div class="alert alert-error"   id="registerError"></div>
      <div class="alert alert-success" id="registerSuccess"></div>

      <form id="registerForm" novalidate>
        <!-- Job Seeker fields -->
        <div id="jobseekerFields">
          <div class="form-group">
            <label for="fullName">الاسم الكامل</label>
            <input type="text" id="fullName" placeholder="محمد عبدالله" autocomplete="name">
          </div>
        </div>

        <!-- Admin fields -->
        <div id="adminFields" style="display:none;">
          <div class="form-group">
            <label for="orgName">اسم المؤسسة</label>
            <input type="text" id="orgName" placeholder="مستشفى / عيادة / مركز صحي" autocomplete="organization">
          </div>
        </div>

        <div class="form-group">
          <label for="regEmail">البريد الإلكتروني</label>
          <input type="email" id="regEmail" placeholder="example@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="regPhone">رقم الجوال</label>
          <input type="tel" id="regPhone" placeholder="05xxxxxxxx" maxlength="10" autocomplete="tel">
        </div>
        <div class="form-group">
          <label for="regPassword">كلمة المرور</label>
          <input type="password" id="regPassword" placeholder="8 أحرف على الأقل" autocomplete="new-password">
        </div>

        <button type="submit" class="btn btn-primary form-btn">إنشاء الحساب</button>
      </form>

      <div class="auth-footer">
        لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a>
      </div>
    </div>
  </main>

  <!-- Firebase Compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>
  <script src="script.js"></script>
  <script>
    // Flag to block onAuthStateChanged redirect during registration
    let isRegistering = false;

    // Redirect if already logged in (but NOT during registration process)
    firebase.auth().onAuthStateChanged(function (user) {
      if (user && !isRegistering) window.location.href = 'jobs.html';
    });

    let selectedType = 'jobseeker';

    function selectType(type) {
      selectedType = type;
      document.getElementById('typeJobSeeker').classList.toggle('selected', type === 'jobseeker');
      document.getElementById('typeAdmin').classList.toggle('selected', type === 'admin');
      document.getElementById('jobseekerFields').style.display = type === 'jobseeker' ? 'block' : 'none';
      document.getElementById('adminFields').style.display     = type === 'admin'     ? 'block' : 'none';
    }

    document.getElementById('registerForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const email    = document.getElementById('regEmail').value.trim();
      const phone    = document.getElementById('regPhone').value.trim();
      const password = document.getElementById('regPassword').value;
      const errorBox   = document.getElementById('registerError');
      const successBox = document.getElementById('registerSuccess');
      const btn = this.querySelector('button[type="submit"]');

      const nameVal = selectedType === 'jobseeker'
        ? document.getElementById('fullName').value.trim()
        : document.getElementById('orgName').value.trim();

      const errors = [];
      if (!nameVal) errors.push(selectedType === 'jobseeker' ? 'يرجى إدخال الاسم الكامل' : 'يرجى إدخال اسم المؤسسة');
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) errors.push('يرجى إدخال بريد إلكتروني صحيح');
      if (!phone || phone.length < 10 || !/^\d+$/.test(phone)) errors.push('يرجى إدخال رقم جوال صحيح (10 أرقام)');
      if (!password || password.length < 8) errors.push('كلمة المرور يجب أن تكون 8 أحرف على الأقل');

      errorBox.style.display   = 'none';
      successBox.style.display = 'none';

      if (errors.length) {
        errorBox.innerHTML     = errors.join('<br>');
        errorBox.style.display = 'block';
        return;
      }

      isRegistering = true;
      btn.textContent = 'جاري الإنشاء...';
      btn.disabled = true;

      try {
        // Step 1: Create user in Firebase Authentication
        const credential = await firebase.auth().createUserWithEmailAndPassword(email, password);
        const user = credential.user;

        // Step 2: Save extra profile data to Firestore
        const userData = {
          uid: user.uid,
          role: selectedType,
          email: email,
          phone: phone,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };
        if (selectedType === 'jobseeker') {
          userData.name = nameVal;
        } else {
          userData.orgName = nameVal;
        }
        await firebase.firestore().collection('users').doc(user.uid).set(userData);

        // Step 3: Sign out so the user logs in fresh via login.html
        await firebase.auth().signOut();
        localStorage.removeItem('rawad_current_user');

        isRegistering = false;

        successBox.textContent   = 'تم إنشاء الحساب بنجاح! جاري التحويل إلى صفحة الدخول...';
        successBox.style.display = 'block';

        setTimeout(function () {
          window.location.href = 'login.html';
        }, 1500);

      } catch (err) {
        isRegistering = false;
        btn.textContent = 'إنشاء الحساب';
        btn.disabled = false;

        let msg = 'حدث خطأ (' + err.code + ')';
        if (err.code === 'auth/email-already-in-use')    msg = 'البريد الإلكتروني مسجل بالفعل';
        else if (err.code === 'auth/weak-password')       msg = 'كلمة المرور ضعيفة جداً (8 أحرف على الأقل)';
        else if (err.code === 'auth/invalid-email')       msg = 'صيغة البريد الإلكتروني غير صحيحة';
        else if (err.code === 'auth/operation-not-allowed') msg = 'تسجيل البريد الإلكتروني غير مفعّل — يرجى تفعيل Email/Password في Firebase Console';
        else if (err.code === 'auth/network-request-failed') msg = 'خطأ في الاتصال بالإنترنت، يرجى المحاولة مجدداً';

        errorBox.textContent   = msg;
        errorBox.style.display = 'block';
        console.error('Firebase registration error:', err.code, err.message);
      }
    });
  </script>
</body>
</html>
