<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إعداد حساب Superadmin</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Tajawal', sans-serif; background: #f4f7fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .card { background: #fff; padding: 40px; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); max-width: 480px; width: 100%; text-align: center; }
    h1 { color: #023E8A; margin-bottom: 8px; font-size: 1.5rem; }
    p  { color: #666; margin-bottom: 24px; }
    .info-box { background: #f0f8ff; border: 1px solid #90e0ef; border-radius: 8px; padding: 16px; margin-bottom: 24px; text-align: right; font-size: 0.9rem; line-height: 2; }
    .info-box strong { color: #023E8A; }
    button { background: linear-gradient(135deg, #0077B6, #023E8A); color: #fff; border: none; padding: 14px 32px; border-radius: 8px; font-size: 1rem; font-family: 'Tajawal', sans-serif; font-weight: 700; cursor: pointer; width: 100%; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    #status { margin-top: 20px; padding: 14px; border-radius: 8px; display: none; font-weight: 700; }
    .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .warning { background: #fff3cd; color: #856404; border: 1px solid #ffc107; margin-top: 24px; padding: 14px; border-radius: 8px; font-size: 0.85rem; }
  </style>
</head>
<body>

  <div class="card">
    <h1>إنشاء حساب Superadmin</h1>
    <p>هذه الصفحة تُستخدم مرة واحدة فقط</p>

    <div class="info-box">
      <strong>البريد الإلكتروني:</strong> kramabid1@gmail.com<br>
      <strong>كلمة المرور:</strong> Aa885522@<br>
      <strong>اسم المستخدم:</strong> kjuui-ki<br>
      <strong>الدور:</strong> superadmin
    </div>

    <button id="createBtn" onclick="createSuperAdmin()">إنشاء حساب Superadmin</button>

    <div id="status"></div>

    <div class="warning">
      ⚠️ بعد إنشاء الحساب بنجاح، احذف هذه الصفحة أو لا تشاركها مع أي شخص.
    </div>
  </div>

  <!-- Firebase Compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>
  <script>
    async function createSuperAdmin() {
      const btn    = document.getElementById('createBtn');
      const status = document.getElementById('status');

      btn.disabled    = true;
      btn.textContent = 'جاري الإنشاء...';
      status.style.display = 'none';

      const email    = 'kramabid1@gmail.com';
      const password = 'Aa885522@';
      const username = 'kjuui-ki';

      try {
        // Create user in Firebase Auth
        const credential = await firebase.auth().createUserWithEmailAndPassword(email, password);
        const user = credential.user;

        // Save data to Firestore
        await firebase.firestore().collection('users').doc(user.uid).set({
          uid: user.uid,
          username: username,
          email: email,
          role: 'superadmin',
          status: 'approved',
          createdAt: new Date()
        });

        status.className   = 'success';
        status.textContent = '✅ تم إنشاء حساب Superadmin بنجاح! يمكنك الآن تسجيل الدخول.';
        status.style.display = 'block';
        btn.textContent = 'تم الإنشاء ✓';

      } catch (err) {
        btn.disabled    = false;
        btn.textContent = 'إنشاء حساب Superadmin';

        let msg = 'حدث خطأ: ' + err.message;
        if (err.code === 'auth/email-already-in-use') {
          msg = '⚠️ هذا البريد الإلكتروني مسجّل مسبقاً. تحقق من Firestore لضمان أن الدور superadmin محفوظ بشكل صحيح.';
          status.className = 'warning';
        } else {
          status.className = 'error';
        }

        status.textContent   = msg;
        status.style.display = 'block';
      }
    }
  </script>
</body>
</html>
