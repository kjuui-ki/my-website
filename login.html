<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | Rawad Health</title>
  <meta name="description" content="سجّل دخولك إلى منصة Rawad Health للتوظيف الصحي.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="container">
      <nav class="navbar">
        <a href="index.html" class="logo">
          <img src="images/logo.png" alt="Rawad Health" height="120" style="object-fit:contain;">
        </a>
        <div class="nav-desktop">
          <a href="index.html" data-i18n="navHome">الرئيسية</a>
          <a href="jobs.html" data-i18n="navJobs">الوظائف</a>
          <a href="contact.html" data-i18n="navContact">تواصل معنا</a>
        </div>
        <div class="nav-cta">
          <div class="auth-btns" id="authButtons">
            <a href="login.html" class="btn btn-outline" style="padding: 10px 24px; font-size: 0.9rem;" data-i18n="authLogin">تسجيل الدخول</a>
            <a href="register.html" class="btn btn-primary" style="padding: 10px 24px; font-size: 0.9rem;" data-i18n="authRegister">إنشاء حساب</a>
          </div>
          <div class="user-menu" id="userMenu" style="display:none; align-items:center; gap:10px;">
            <span class="user-greeting" id="userGreeting"></span>
            <button class="btn btn-outline" onclick="authLogout()" style="padding: 10px 24px; font-size: 0.9rem;" data-i18n="authLogout">تسجيل الخروج</button>
          </div>
          <div class="lang-switcher">
            <button class="lang-btn" id="langToggle" aria-label="تغيير اللغة" onclick="toggleLanguage()">
              <span class="lang-icon">🌐</span>
              <span class="lang-label" data-i18n="langLabel">EN</span>
            </button>
          </div>
        </div>
        <button class="hamburger" aria-label="القائمة">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </nav>
    </div>
  </header>

  <!-- Mobile nav drawer (outside header to avoid stacking context issues) -->
  <div class="nav-links">
    <a href="index.html" data-i18n="navHome">الرئيسية</a>
    <a href="jobs.html" data-i18n="navJobs">الوظائف</a>
    <a href="contact.html" data-i18n="navContact">تواصل معنا</a>
    <div class="mobile-auth">
      <div class="mobile-auth-divider"></div>
      <div class="mobile-auth-inner" id="mobileAuthButtons">
        <a href="login.html" class="btn btn-outline mobile-auth-btn" data-i18n="authLogin">تسجيل الدخول</a>
        <a href="register.html" class="btn btn-primary mobile-auth-btn" data-i18n="authRegister">إنشاء حساب</a>
      </div>
      <div class="mobile-user-section" id="mobileUserMenu" style="display:none;">
        <span class="mobile-user-greeting" id="mobileUserGreeting"></span>
        <button class="btn btn-outline mobile-auth-btn" onclick="authLogout()" data-i18n="authLogout">تسجيل الخروج</button>
      </div>
    </div>
  </div>

  <!-- Dark overlay behind mobile menu -->
  <div class="nav-overlay" id="navOverlay"></div>

  <!-- Login Form -->
  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="images/logo.png" alt="Rawad Health" height="120" style="object-fit:contain;">
      </div>
      <h1 class="auth-title" data-i18n="loginTitle">تسجيل الدخول</h1>
      <p class="auth-subtitle" data-i18n="loginSubtitle">أهلاً بك في منصة Rawad Health</p>

      <div class="alert alert-error" id="loginError" style="display:none;"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="loginEmail" data-i18n="labelEmail">البريد الإلكتروني</label>
          <input type="email" id="loginEmail" placeholder="example@email.com" autocomplete="email">
          <div class="field-error" id="emailError">يرجى إدخال بريد إلكتروني صحيح</div>
        </div>
        <div class="form-group">
          <label for="loginPassword" data-i18n="labelPassword">كلمة المرور</label>
          <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
          <div class="field-error" id="passwordError">يرجى إدخال كلمة المرور</div>
        </div>
        <button type="submit" class="btn btn-primary form-btn" data-i18n="loginBtn">دخول</button>
      </form>

      <div class="auth-footer">
        <span data-i18n="loginNoAccount">ليس لديك حساب؟</span> <a href="register.html" data-i18n="loginCreateNew">إنشاء حساب جديد</a>
      </div>
    </div>
  </main>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabaseClient.js"></script>
  <script src="script.js"></script>
  <script>
    // Redirect if already logged in
    window._supabase.auth.getSession().then(function ({ data: { session } }) {
      if (session) {
        console.log('[Login] Already logged in as:', session.user.email, '— redirecting away from login page.');
        if (session.user.email === 'kramabid1@gmail.com') {
          window.location.href = 'admin-panel.html';
        } else {
          var nextUrl = new URLSearchParams(window.location.search).get('next');
          window.location.href = nextUrl || 'dashboard.html';
        }
      } else {
        console.log('[Login] No active session — login form is ready.');
      }
    });

    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const email    = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errorBox = document.getElementById('loginError');
      const btn = this.querySelector('button[type="submit"]');
      let valid = true;

      // Validate email
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        document.getElementById('loginEmail').classList.add('error');
        document.getElementById('emailError').style.display = 'block';
        valid = false;
      } else {
        document.getElementById('loginEmail').classList.remove('error');
        document.getElementById('emailError').style.display = 'none';
      }

      // Validate password
      if (!password) {
        document.getElementById('loginPassword').classList.add('error');
        document.getElementById('passwordError').style.display = 'block';
        valid = false;
      } else {
        document.getElementById('loginPassword').classList.remove('error');
        document.getElementById('passwordError').style.display = 'none';
      }

      if (!valid) return;

      btn.textContent = 'جاري الدخول...';
      btn.disabled = true;

      try {
        // Log session state before attempting login
        const { data: { session: _sessionBefore } } = await window._supabase.auth.getSession();
        console.log('[Login] Session BEFORE signInWithPassword:', _sessionBefore ? 'EXISTS: ' + _sessionBefore.user.email : 'none');

        const { data, error } = await window._supabase.auth.signInWithPassword({ email, password });
        console.log('[Login] signInWithPassword result — user:', data?.session?.user?.email, '| uid:', data?.session?.user?.id, '| error:', error?.message || null);

        if (error) {
          console.error('[Login] Supabase auth error:', error);
          btn.textContent = 'دخول';
          btn.disabled = false;
          let msg;
          const msg_lower = (error.message || '').toLowerCase();
          if (msg_lower.includes('invalid login') || msg_lower.includes('invalid_credentials') || msg_lower.includes('invalid credentials')) {
            msg = 'البريد الإلكتروني أو كلمة المرور غير صحيحة';
          } else if (msg_lower.includes('email not confirmed') || msg_lower.includes('not confirmed')) {
            msg = 'يرجى تأكيد بريدك الإلكتروني أولاً — تحقق من صندوق الوارد وانقر على رابط التأكيد.<br><a href="#" id="resendLink" style="color:inherit;font-weight:700;text-decoration:underline;">إعادة إرسال رسالة التأكيد</a>';
            errorBox.innerHTML = msg;
            errorBox.style.display = 'block';
            var resendLink = document.getElementById('resendLink');
            if (resendLink) {
              resendLink.addEventListener('click', async function(ev) {
                ev.preventDefault();
                resendLink.textContent = 'جاري الإرسال...';
                const r = await window._supabase.auth.resend({ type: 'signup', email: email });
                resendLink.textContent = r.error ? ('خطأ: ' + r.error.message) : '✅ تم إرسال رسالة تأكيد جديدة — تحقق من بريدك';
              });
            }
            return;
          } else if (msg_lower.includes('too many') || msg_lower.includes('rate limit')) {
            msg = 'محاولات كثيرة جداً، يرجى الانتظار قليلاً ثم المحاولة مجدداً';
          } else {
            msg = 'خطأ: ' + error.message;
          }
          errorBox.textContent   = msg;
          errorBox.style.display = 'block';
          return;
        }

        console.log('[Login] Session AFTER login — user:', data.session?.user?.email, '| uid:', data.session?.user?.id);
        if (!data.session) {
          btn.textContent = 'دخول';
          btn.disabled = false;
          errorBox.textContent   = 'يرجى تأكيد بريدك الإلكتروني أولاً — تحقق من صندوق الوارد';
          errorBox.style.display = 'block';
          return;
        }

        // Check admin approval status (superadmin bypasses this check)
        if (data.session.user.email !== 'kramabid1@gmail.com') {
          const { data: userRow } = await window._supabase
            .from('users')
            .select('role, status')
            .eq('id', data.session.user.id)
            .maybeSingle();

          if (userRow && userRow.role === 'admin' && userRow.status === 'pending') {
            await window._supabase.auth.signOut();
            btn.textContent = 'دخول';
            btn.disabled = false;
            errorBox.textContent   = '⏳ حسابك قيد مراجعة المدير العام — يرجى الانتظار حتى يتم قبول طلبك';
            errorBox.style.display = 'block';
            return;
          }
          if (userRow && userRow.role === 'admin' && userRow.status === 'rejected') {
            await window._supabase.auth.signOut();
            btn.textContent = 'دخول';
            btn.disabled = false;
            errorBox.textContent   = '❌ تم رفض طلب تسجيلك — يرجى التواصل مع الإدارة';
            errorBox.style.display = 'block';
            return;
          }
        }

        errorBox.style.display = 'none';
        if (data.session.user.email === 'kramabid1@gmail.com') {
          window.location.href = 'admin-panel.html';
        } else {
          var nextUrl = new URLSearchParams(window.location.search).get('next');
          window.location.href = nextUrl || 'dashboard.html';
        }

      } catch (ex) {
        console.error('[Login] Unexpected exception:', ex);
        btn.textContent = 'دخول';
        btn.disabled = false;
        errorBox.textContent   = 'حدث خطأ غير متوقع: ' + (ex.message || ex);
        errorBox.style.display = 'block';
      }
    });
  </script>
</body>
</html>
